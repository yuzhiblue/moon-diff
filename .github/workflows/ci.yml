name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install MoonBit (latest)
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh -o /tmp/unix.sh
          MOONBIT_INSTALL_VERSION=latest bash /tmp/unix.sh
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - name: Build
        run: moon build --target wasm-gc
      - name: Test
        run: moon test --target wasm-gc
